<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1></h1>
    <div class="guess-game">
        <div class="game-area">
            <div class="inputs"></div>
            <div class="control">
                <button class="check">check words</button>
                <button class="hint"><span></span> hints</button>
                <button class="reset"></button>
            </div>
            <div class="message"></div>
        </div>
        <div class="key-colors">
            <h2>key colors</h2>
            <div class="key-color">
                <div class="color #18ba89"></div>
                <div class="color-text">
                    Letter is Right And in place
                </div>
            </div>
            <div class="key-color">
                <div class="color #f89e13"></div>
                <div class="color-text">
                    Letter is Right but not in place
                </div>
            </div>
            <div class="key-color">
                <div class="color #27303f"></div>
                <div class="color-text">
                    Letter is not right And not exist in word
                </div>
            </div>
        </div>
    </div>
    <footer></footer>
    <script src="main.js"></script>
</body>

</html>
